<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

  <link rel="apple-touch-icon" href="icons/icon-72x72.png" sizes="72x72" type="image/png" />
  <link rel="apple-touch-icon" href="icons/icon-96x96.png" sizes="96x96" type="image/png" />
  <link rel="apple-touch-icon" href="icons/icon-128x128.png" sizes="128x128" type="image/png" />
  <link rel="apple-touch-icon" href="icons/icon-144x144.png" sizes="144x144" type="image/png" />
  <link rel="apple-touch-icon" href="icons/icon-152x152.png" sizes="152x152" type="image/png" />
  <link rel="apple-touch-icon" href="icons/icon-192x192.png" sizes="192x192" type="image/png" />
  <link rel="apple-touch-icon" href="icons/icon-384x384.png" sizes="384x384" type="image/png" />
  <link rel="apple-touch-icon" href="icons/icon-512x512.png" sizes="512x512" type="image/png" />

  <meta name="theme-color" content="#000" />

  <style>
    html { background: #444; font-family: sans-serif; }
    body, html { overscroll-behavior: none; }
    #canvas, #overlayDiv { position: absolute; top:0; left:0; width:100%; height:100%; border:0 none; }
    #canvas { background: #000; }
    .visible { visibility: visible; opacity: 1.0; transition: opacity .1s linear; }
    .hidden { visibility: hidden; opacity:0; transition: visibility 0s .25s, opacity .25s linear; }
    #statusDiv, #inputDiv { background: rgba(0,0,0,0.75); width:50%; margin:auto; min-width:340px; padding:10px; position:absolute; top:0; left:0; right:0; border-radius:0 0 5px 5px; }
    #statusTextDiv { overflow:auto; max-height:40vh; color:#ccc; font-size:14px; }
    #statusProgress { display:none; width:100%; }
    #inputDiv { width:65%; padding-left:10px; padding-right:20px; }
    #inputPrompt { color:#eee; font-size:150%; margin-bottom:1em; margin-top:1em; }
    #inputText { width:100%; font-size:175%; padding:5px; background:inherit; color:#eee; }
    #inputText:focus { color:#fff; }
    #ContextContainer { position:absolute; left:0; top:0; color:white; }
    #ContextContainer.shown { background: rgba(0,0,0,0.5); border-radius:0 0 5px 0; }
    #ContextButton { text-decoration:none; color:lightgrey; font-size:xx-large; cursor:pointer; user-select:none; -moz-user-select:none; padding:10px 10px; opacity:.75; }
    #ContextButton:focus { outline:none; color:#fff; opacity:1; }
    #ContextMenu a { text-decoration:none; color:lightgrey; background:#444; height:48px; width:250px; border-radius:5px; border:1px solid lightgrey; display:flex; align-items:center; justify-content:center; margin:5px 5px; opacity:1; }
    #ContextMenu a:hover { background:#666; color:#fff; }
    #presplash { position:absolute; top:0; left:0; display:block; margin:auto; width:100%; height:100%; object-fit:contain; }
  </style>
</head>

<body>
  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>
  <div id="overlayDiv"></div>
  <img id="presplash" src="web-presplash.jpg">

  <div id="ContextContainer">
    <a id="ContextButton">&#8801;</a><br />
    <div id="ContextMenu" style="display:none;">
      <input id="ID_SavegamesImport" type="file" onchange="onSavegamesImport(this)" accept="application/zip" style="display:none">
      <a href="javascript:document.getElementById('ID_SavegamesImport').click();">Import Saves</a>
      <a href="javascript:onSavegamesExport();">Export Saves</a>
      <a href="javascript:FSDownload('/log.txt','text/plain');">Download Log</a>
      <a href="https://github.com/GLITCHED-OVERRIDE" target="_blank">Check out our GitHub!</a>
    </div>
  </div>

  <div id="statusDiv" class="hidden">
    <div id="statusTextDiv"></div>
    <progress id="statusProgress" value="0" max="100"></progress>
  </div>

  <div id="inputDiv" class="hidden">
    <form id="inputForm">
      <div id="inputPrompt"></div>
      <input id="inputText" type="text">
    </form>
  </div>

  <!-- MERGE game.zip parts BEFORE any other script runs -->
  <script>
    (async () => {
      const parts = ['game.zip.part1', 'game.zip.part2']; // add more parts as needed
      const buffers = [];
      for (let i = 0; i < parts.length; i++) {
        const res = await fetch(parts[i]);
        if (!res.ok) throw new Error(`Failed to fetch ${parts[i]}`);
        const buf = await res.arrayBuffer();
        buffers.push(new Uint8Array(buf));
        console.log(`Fetched ${parts[i]} (${buf.byteLength} bytes)`);
      }

      let totalLen = buffers.reduce((sum,b)=>sum+b.length,0);
      const merged = new Uint8Array(totalLen);
      let offset=0;
      for (let b of buffers) { merged.set(b, offset); offset+=b.length; }

      // Store merged file as Blob
      window.gameZipBlob = new Blob([merged], { type:'application/zip' });
      window.gameZipURL = URL.createObjectURL(window.gameZipBlob);
      console.log('Merged game.zip ready in memory');

      // Now load the rest of the scripts
      const preloadScripts = ['renpy-pre.js', 'renpy.js'];
      for (let src of preloadScripts) {
        const s = document.createElement('script');
        s.src = src;
        s.async = src.endsWith('renpy.js'); // keep last script async if needed
        document.head.appendChild(s);
      }
    })();

    // Register the service worker
    if (navigator.serviceWorker) {
      if (!navigator.serviceWorker.controller) {
        navigator.serviceWorker.register('./service-worker.js', { updateViaCache: 'all' });
      }
    }
  </script>
</body>
</html>
