<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Binding of Issac: Wrath of the Lamb</title>
<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
}

#player {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
}

ruffle-player {
    width: 100% !important;
    height: 100% !important;
    display: block;
}
</style>
</head>

<body>
<div id="player"></div>

<script>
async function fetchParts() {
    const parts = [
        "game.swf.part1",
        "game.swf.part2",
        "game.swf.part3"
    ];

    const buffers = [];
    for (const part of parts) {
        const res = await fetch(part);
        if (!res.ok) throw new Error("Failed to load " + part);
        buffers.push(await res.arrayBuffer());
    }

    let totalLength = buffers.reduce((s, b) => s + b.byteLength, 0);
    let merged = new Uint8Array(totalLength);
    let offset = 0;

    for (const b of buffers) {
        merged.set(new Uint8Array(b), offset);
        offset += b.byteLength;
    }

    return new Blob([merged], { type: "application/x-shockwave-flash" });
}

(async () => {
    const blob = await fetchParts();
    const url = URL.createObjectURL(blob);

    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();

    const container = document.getElementById("player");
    container.appendChild(player);

    player.load(url);
})();
</script>

</body>
</html>
