<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="curser/curser.css">
<title>Stratus</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{--bg:#070707;--purple:#9b4dff;}
html,body{margin:0;height:100%;background:var(--bg);color:white;font-family:system-ui;overflow:hidden}

/* TOP BAR */
#topbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:70px;
    background:rgba(155,50,120,.15);
    backdrop-filter:blur(10px);
    display:flex;
    align-items:center;
    z-index:10;
    padding:0 20px;
    box-sizing:border-box;
}
#logo{height:45px;margin-right:20px}

/* SEARCH BAR */
#searchContainer{
    position:relative;
    flex:1;
    max-width:600px;
}
#searchInput{
    width:100%;
    padding:12px 18px;
    border-radius:30px;
    border:none;
    background:rgba(0,0,0,.6);
    color:white;
    font-size:16px;
    transition:.3s;
    box-shadow:0 2px 6px rgba(0,0,0,0.5);
}
#searchInput:focus{
    outline:none;
    background:rgba(0,0,0,.85);
    box-shadow:0 0 10px var(--purple);
}
#searchResults{
    position:absolute;
    top:50px;
    width:100%;
    background:#0a0a0a;
    border:1px solid rgba(155,77,255,.4);
    display:none;
    max-height:300px;
    overflow-y:auto;
    border-radius:10px;
    z-index:50;
}
.searchItem{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 12px;
    cursor:pointer;
}
.searchItem img{
    width:40px;
    height:40px;
    object-fit:cover;
    border-radius:6px;
}
.searchItem:hover{background:rgba(155,77,255,.2)}

/* SIDEBAR */
#sidebar{
    position:fixed;
    top:70px;
    left:0;
    width:120px; /* wider sidebar */
    height:calc(100% - 70px);
    background:black;
    border-right:1px solid rgba(155,77,255,.2);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:10px;
}

/* Sidebar button with edge-to-edge outline */
.sideBtn{
    position:relative;
    width:100%;          /* full width of sidebar */
    aspect-ratio:16/9;   /* maintain 16:9 */
    margin:12px 0;
    cursor:pointer;
    color:white;
    font-size:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    background:transparent;
    border:none;
    z-index:1;
}

/* Outline fills entire button */
.sideBtn::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:url("/img/bt-off.png") no-repeat center / cover;
    z-index:-1;
    transition:background 0.12s ease;
}

/* Hover outline */
.sideBtn:hover::before{
    background:url("/img/bt-on.png") no-repeat center / cover;
}

/* Hover text glow */
.sideBtn:hover{
    color:var(--purple);
}

/* MAIN AREA */
#menuArea{
    position:absolute;
    top:70px;
    left:120px; /* adjust for wider sidebar */
    width:calc(100% - 120px);
    height:calc(100% - 70px);
    padding:20px;
    overflow-y:auto;
}
.sectionTitle{font-size:18px;margin:12px 0;font-weight:600}

/* GAME ROWS */
.gameRow{
    display:flex;
    gap:14px;
    overflow-x:auto;
    padding-bottom:12px;
    flex-wrap:nowrap;
}

/* GAME TILE */
.gameTile{
    position:relative;
    min-width:140px;
    width:140px;
    flex:0 0 auto;
    aspect-ratio:1/1;
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    border:1px solid rgba(255,255,255,.08);
    transition:.2s;
}
.gameTile:hover{transform:scale(1.05);border-color:var(--purple)}
.gameTile img{width:100%;height:100%;object-fit:cover}
.gameTile div{
    position:absolute;
    bottom:0;
    width:100%;
    padding:6px;
    font-size:13px;
    background:linear-gradient(to top,rgba(0,0,0,.85),transparent);
    text-align:center;
}

/* POPUP */
#gamePopup{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);display:none;z-index:100}
#popupContent{display:grid;grid-template-columns:240px 1fr 240px;height:100%}
.sideCol{background:#080808;padding:10px;overflow-y:auto}
#gameCenter{display:flex;flex-direction:column}
#gameFrame{flex:1;border:none}
#gameControls{display:flex;gap:10px;padding:10px;background:#0a0a0a}
#gameControls button{background:#111;border:1px solid rgba(155,77,255,.4);color:white;padding:8px 14px;cursor:pointer}

/* CLOSE BUTTON */
#closePopup{position:absolute;top:10px;right:15px;font-size:22px;cursor:pointer;color:white;z-index:200}
#closePopup:hover{color:red}
</style>
</head>

<body>

<div id="topbar">
  <img src="/img/Icon.png" id="logo">
  <div id="searchContainer">
    <input id="searchInput" placeholder="Search games...">
    <div id="searchResults"></div>
  </div>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sideBtn" id="homeBtn">Home</div>
  <div class="sideBtn" id="recentBtn">Recent</div>
  <div class="sideBtn" id="exploreBtn">Explore</div>
</div>

<div id="menuArea"></div>

<!-- GAME POPUP -->
<div id="gamePopup">
  <div id="closePopup">✕</div>
  <div id="popupContent">
    <div id="sideLeft" class="sideCol"></div>

    <div id="gameCenter">
      <iframe id="gameFrame"></iframe>
      <div id="gameControls">
        <button id="fsBtn">Fullscreen</button>
        <button id="tabBtn">Open in New Tab</button>
      </div>
    </div>

    <div id="sideRight" class="sideCol"></div>
  </div>
</div>

<script>
const GAMES_JSON="/Games/Zones.json";
const menuArea=document.getElementById("menuArea");
const gamePopup=document.getElementById("gamePopup");
const gameFrame=document.getElementById("gameFrame");
const sideLeft=document.getElementById("sideLeft");
const sideRight=document.getElementById("sideRight");
const searchInput=document.getElementById("searchInput");
const searchResults=document.getElementById("searchResults");

let games=[];
let recent=JSON.parse(localStorage.getItem("recentGames")||"[]");

/* LOAD GAMES */
fetch(GAMES_JSON).then(r=>r.json()).then(d=>{games=d;loadHome();});

/* TILE */
function makeTile(game){
  const t=document.createElement("div");
  t.className="gameTile";
  t.innerHTML=`<img src="${game.cover}"><div>${game.name}</div>`;
  t.onclick=()=>openGame(game);
  return t;
}

/* TITLE */
function title(text){
  const t=document.createElement("div");
  t.className="sectionTitle";
  t.textContent=text;
  return t;
}

/* MAKE MULTI ROWS */
function makeRows(list){
  for(let i=0;i<list.length;i+=20){
    const row=document.createElement("div");
    row.className="gameRow";
    list.slice(i,i+20).forEach(g=>row.appendChild(makeTile(g)));
    menuArea.appendChild(row);
  }
}

/* HOME */
function loadHome(){
  menuArea.innerHTML="";
  if(recent.length){
    menuArea.appendChild(title("Recently Played"));
    makeRows(recent.slice(-40).reverse());
  }
  menuArea.appendChild(title("Games You Might Like"));
  const shuffled=[...games].sort(()=>0.5-Math.random());
  makeRows(shuffled.slice(0,60));
}

/* RECENT */
function loadRecent(){
  menuArea.innerHTML="";
  menuArea.appendChild(title("Recently Played"));
  makeRows(recent.slice().reverse());
}

/* EXPLORE */
function loadExplore(){
  menuArea.innerHTML="";
  menuArea.appendChild(title("Explore Games"));
  makeRows(games);
}

/* OPEN GAME */
function openGame(game){
  recent=recent.filter(g=>g.url!==game.url);
  recent.push(game);
  localStorage.setItem("recentGames",JSON.stringify(recent));

  const recentSection=document.querySelector('#menuArea .sectionTitle');
  if(recentSection && recentSection.textContent==="Recently Played"){
    loadRecent();
  }

  gamePopup.style.display="block";
  gameFrame.src=game.url;

  sideLeft.innerHTML="";
  sideRight.innerHTML="";
  const r=games.filter(g=>g.url!==game.url).sort(()=>0.5-Math.random());
  r.slice(0,5).forEach(g=>sideLeft.appendChild(makeTile(g)));
  r.slice(5,10).forEach(g=>sideRight.appendChild(makeTile(g)));
}

/* SEARCH */
searchInput.oninput=()=>{
  const q=searchInput.value.toLowerCase();
  searchResults.innerHTML="";
  if(!q){searchResults.style.display="none";return;}
  games.filter(g=>g.name.toLowerCase().includes(q)).slice(0,5).forEach(g=>{
    const d=document.createElement("div");
    d.className="searchItem";
    d.innerHTML=`<img src="${g.cover}"><span>${g.name}</span>`;
    d.onclick=()=>{openGame(g);searchResults.style.display="none";}
    searchResults.appendChild(d);
  });
  searchResults.style.display="block";
};

/* BUTTONS */
document.getElementById("fsBtn").onclick=()=>gameFrame.requestFullscreen();
document.getElementById("tabBtn").onclick=()=>window.open(gameFrame.src,"_blank");
document.getElementById("homeBtn").onclick=loadHome;
document.getElementById("recentBtn").onclick=loadRecent;
document.getElementById("exploreBtn").onclick=loadExplore;

/* CLOSE POPUP */
document.getElementById("closePopup").onclick=closePopup;
gamePopup.onclick=e=>{if(e.target===gamePopup)closePopup();};
document.onkeydown=e=>{if(e.key==="Escape")closePopup();};

function closePopup(){
  gamePopup.style.display="none";
  gameFrame.src="";
}
</script>

</body>
</html>
